<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FUT Auction Mobile</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    text-align: center;
}

/* Nom joueur (design chic) */
#player {
    font-size: 26px;
    margin: 15px;
    padding: 12px;
    border-radius: 12px;
    background: linear-gradient(90deg,#1f2937,#111827);
    box-shadow: 0 0 10px rgba(255,215,0,0.3);
    letter-spacing: 1px;
}

/* Bouton */
button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
}

.btnNext {
    background: gold;
    color: black;
    margin: 10px;
}

/* Layout vertical */
.container {
    display: flex;
    flex-direction: column;
    gap: 25px;
}

/* Team */
.team {
    width: 95%;
    margin: auto;
}

/* Titre cliquable */
.team h2 {
    cursor: pointer;
    background: linear-gradient(90deg,#2563eb,#1d4ed8);
    padding: 8px;
    border-radius: 10px;
}

.teamA h2 {
    background: linear-gradient(90deg,#16a34a,#15803d);
}

/* Terrain */
.field {
    background-image: url("https://img.freepik.com/free-vector/vector-green-soccer-field-football-field-gridiron_1284-41290.jpg");
    background-size: cover;
    border-radius: 15px;
    height: 500px;
    position: relative;
}

/* Cartes */
.card {
    position: absolute;
    width: 85px;
    height: 105px;
    background: linear-gradient(135deg, gold, orange);
    border-radius: 12px;
    padding: 6px;
    color: black;
    font-weight: bold;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Texte carte */
.rating { font-size: 16px; }
.name { font-size: 12px; }
.price { font-size: 11px; }

/* positions */
.p1 { top: 5%; left: 20%; }
.p2 { top: 5%; right: 20%; }
.p3 { top: 40%; left: 50%; transform: translateX(-50%); }
.p4 { bottom: 5%; left: 20%; }
.p5 { bottom: 5%; right: 20%; }

/* budget */
.budget {
    margin-bottom: 5px;
    font-weight: bold;
}

/* restart en bas */
.footer {
    margin: 20px;
}

.btnRestart {
    background: red;
    color: white;
}

</style>
</head>

<body>

<h1>⚽ FUT Auction</h1>

<div id="player">Clique sur Suivant</div>

<button class="btnNext" onclick="nextPlayer()">Suivant</button>

<div class="container">

<!-- TEAM B -->
<div class="team">
    <h2 onclick="addPlayer('A')">Équipe A </h2>
    <div class="budget" id="budgetA">💰 500M</div>
    <div class="field" id="fieldB"></div>
</div>

<!-- TEAM A -->
<div class="team teamA">
    <h2 onclick="addPlayer('B')">Équipe B </h2>
    <div class="budget" id="budgetB">💰 500M</div>
    <div class="field" id="fieldA"></div>
</div>

</div>

<div class="footer">
    <button class="btnRestart" onclick="restartGame()">Restart</button>
</div>

{name:"Maldini", rating:94}
];

let used = [];
let teamA = [];
let teamB = [];
let budgetA = 500;
let budgetB = 500;
let current = "";

function nextPlayer(){
    let available = players.filter(p => !used.includes(p.name));
    if(!available.length) return;

    current = available[Math.floor(Math.random()*available.length)];

    document.getElementById("player").innerHTML =
        "⭐ " + current.rating + " — " + current.name;
}

function addPlayer(team){
    if(!current) return;

    let price = prompt("Prix ?");
    if(!price || isNaN(price)) return;
    price = parseInt(price);

    if(team==="A"){
        if(teamA.length>=5) return;
        if(budgetA<price) return alert("Budget insuffisant");
        budgetA-=price;
        place("A", current, price, teamA.length);
        teamA.push(current);
    }

    if(team==="B"){
        if(teamB.length>=5) return;
        if(budgetB<price) return alert("Budget insuffisant");
        budgetB-=price;
        place("B", current, price, teamB.length);
        teamB.push(current);
    }

    used.push(current.name);
    current="";
    updateBudget();
    document.getElementById("player").innerText="Suivant";
}

function place(team, player, price, index){
    const posMap=["p1","p2","p3","p4","p5"];
    let field=document.getElementById("field"+team);

    let card=document.createElement("div");
    card.className="card "+posMap[index];

    card.innerHTML=`
        <div class="rating">⭐ ${player.rating}</div>
        <div class="name">${player.name}</div>
        <div class="price">💰 ${price}M</div>
    `;

    field.appendChild(card);
}

function updateBudget(){
    document.getElementById("budgetA").innerText="💰 "+budgetA+"M";
    document.getElementById("budgetB").innerText="💰 "+budgetB+"M";
}

function restartGame(){
    used=[]; teamA=[]; teamB=[];
    budgetA=300; budgetB=300;
    current="";
    document.getElementById("fieldA").innerHTML="";
    document.getElementById("fieldB").innerHTML="";
    updateBudget();
    document.getElementById("player").innerText="Clique sur Suivant";
}

</script>

</html>
